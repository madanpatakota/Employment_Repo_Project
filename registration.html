    Registration
    <form>
      <fieldset>
        <legend>Registration information</legend>
        <div>
          <label>First Name</label>
          <input type="text" name="username" required size="20" />
        </div>
        <div>
          <label>Last Name</label>
          <input type="text" name="username" required size="20" />
        </div>
        <div>
          <label>Email</label>
          <input type="text" name="username" required size="20" />
        </div>
        <button>Submit</button>
      </fieldset>

      <fieldset>
        <legend>Optional fields</legend>
        <div>
          <label>Comments</label>
          <textarea rows="5" name="prepartion" required></textarea>
        </div>
        <div>
          <label>Do you like your employment?</label>
          <input name="grind" value="yes" type="radio" />yes
          <input name="grind" value="no" type="radio" />no
        </div>
        <div>
          <label>Which preferrable timings do you like?</label>
          <input type="checkbox" name="timing" value="Morning" /> Morning
          <input type="checkbox" name="timing" value="Evening" /> Evening
        </div>
        <div>
          <label>What is your favorite country?</label>
          <select name="favarate">
            <option value="">please select a drink</option>
            <option value="1">India</option>
            <option value="2">UK</option>
            <option value="3">US</option>
            <option value="4">Australia</option>
            <option value="5">Denmark</option>
          </select>
        </div>
      </fieldset>
    </form>
